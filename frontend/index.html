<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yomitan Frequency Combiner</title>
  </head>
  <body class="bg-[#2a2a2a] text-[#E6FAFC] min-h-dvh flex items-start justify-center px-4 pt-36 pb-8 antialiased font-sans">

    <nav id="top-nav" class="fixed top-0 left-0 right-0 z-50 pt-6 px-4">
      <div class="grid grid-cols-3 items-center max-w-[860px] mx-auto">
        <button class="page-tab justify-self-end py-3 px-14 bg-transparent border-0 rounded-full text-[rgba(230,250,252,0.75)] text-[1.2rem] font-bold cursor-pointer hover:text-[#E6FAFC]" data-page="recommended">Recommended</button>
        <button class="page-tab active justify-self-center py-3 px-14 bg-transparent border-0 rounded-full text-[rgba(230,250,252,0.75)] text-[1.2rem] font-bold cursor-pointer hover:text-[#E6FAFC]" data-page="combiner">Combiner</button>
        <button class="page-tab justify-self-start py-3 px-14 bg-transparent border-0 rounded-full text-[rgba(230,250,252,0.75)] text-[1.2rem] font-bold cursor-pointer hover:text-[#E6FAFC]" data-page="search">Search</button>
      </div>
    </nav>

    <button id="page-prev" aria-label="Previous page"
      class="page-arrow fixed left-0 top-0 bottom-0 z-40 w-40 flex items-center justify-start pl-6 bg-transparent border-0 text-[rgba(230,250,252,0.3)] hover:text-[#FB923C] cursor-pointer">
      <svg width="44" height="140" viewBox="0 0 44 140" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="32 14 14 70 32 126"/>
      </svg>
    </button>
    <button id="page-next" aria-label="Next page"
      class="page-arrow fixed right-0 top-0 bottom-0 z-40 w-40 flex items-center justify-end pr-6 bg-transparent border-0 text-[rgba(230,250,252,0.3)] hover:text-[#FB923C] cursor-pointer">
      <svg width="44" height="140" viewBox="0 0 44 140" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="12 14 30 70 12 126"/>
      </svg>
    </button>

    <div id="app" class="w-full max-w-[600px] flex flex-col gap-7">

      <section id="page-recommended" class="page flex flex-col gap-7" hidden></section>

      <section id="page-combiner" class="page flex flex-col gap-7">

        <header class="text-center">
          <h1 class="text-4xl font-black tracking-tight">Yomitan Dictionary Combiner</h1>
          <p id="subtitle" class="mt-3 text-[rgba(230,250,252,0.85)] text-[1.15rem]">Combine multiple Yomitan frequency dictionary zips into a single archive.</p>
        </header>

        <nav id="page-tabs" class="flex gap-1.5 bg-[#4a4a4a] border-2 border-[#5a5a5a] rounded-2xl p-1.5">
          <button class="tab active flex-1 py-2.5 px-4 bg-transparent border-0 rounded-xl text-[rgba(230,250,252,0.4)] text-[0.9rem] font-bold cursor-pointer transition-all duration-150 hover:text-[#E6FAFC] hover:bg-[#3a3a3a]" data-tab="frequency">Frequency</button>
          <button class="tab flex-1 py-2.5 px-4 bg-transparent border-0 rounded-xl text-[rgba(230,250,252,0.4)] text-[0.9rem] font-bold cursor-pointer transition-all duration-150 hover:text-[#E6FAFC] hover:bg-[#3a3a3a]" data-tab="kanji">Kanji</button>
        </nav>

        <main class="flex flex-col gap-7">
          <section id="drop-zone" role="button" tabindex="0" aria-label="Drop zip files here or click to browse"
            class="bg-[#4a4a4a] border-2 border-dashed border-[#5a5a5a] rounded-2xl py-20 px-8 text-center cursor-pointer transition-all duration-200">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-[rgba(230,250,252,0.4)] mx-auto mb-5 transition-colors duration-200">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            <p class="text-[1.1rem] font-medium">Drag &amp; drop <code class="font-mono">.zip</code> files here, or <span id="browse-label" class="text-[#FB923C] cursor-pointer font-bold underline underline-offset-[3px] hover:text-[#fdba74]">browse</span></p>
            <input id="file-input" type="file" accept=".zip" multiple class="hidden" />
          </section>

          <section id="file-list-section" hidden>
            <h2 class="text-[#FB923C] text-[0.7rem] font-bold uppercase tracking-[0.12em] mb-2.5">Selected files</h2>
            <ul id="file-list" class="list-none flex flex-col gap-2"></ul>
          </section>

          <section id="options" class="flex flex-col gap-2.5">
            <label for="output-name" class="text-[#FB923C] text-[0.95rem] font-bold">Output Filename</label>
            <div id="name-row" class="flex items-center bg-[#4a4a4a] border-2 border-[#5a5a5a] rounded-xl overflow-hidden transition-colors duration-150">
              <input id="output-name" type="text" placeholder="combined" maxlength="128"
                class="flex-1 bg-transparent border-0 outline-none text-[#E6FAFC] text-[0.95rem] font-medium py-3 px-3.5 placeholder:text-[rgba(230,250,252,0.4)]" />
              <span class="px-3.5 text-[rgba(230,250,252,0.4)] text-[0.9rem] font-bold border-l-2 border-[#5a5a5a] leading-[2.7rem]">.zip</span>
            </div>
          </section>

          <div id="action-row" class="flex flex-col gap-2">
            <button id="combine-btn" disabled
              class="mt-2 w-full py-[0.95rem] border-0 rounded-2xl bg-gradient-to-b from-[#7deda4] to-[#1abc7e] text-white text-base font-extrabold tracking-[0.01em] cursor-pointer shadow-[0_4px_15px_rgba(26,188,126,0.4)] transition-all duration-200 disabled:opacity-40 disabled:cursor-not-allowed disabled:shadow-none">
              Combine &amp; Download
            </button>
          </div>
        </main>

      </section>

      <section id="page-search" class="page flex flex-col gap-7" hidden></section>

    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
